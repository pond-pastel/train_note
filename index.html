                {
                    "@type": "ListItem",

<body>
    <script type="module" src="main.js"></script>
    <div id="toast">
        <input type="checkbox" name="open" id="show-toast">
        <span id="modal"></span>
        <div class="details-content">
            <div>
                <div id="toast-content"></div>
                <div class="flex-center bottom-sticky" id="toast-button-group"></div>
            </div>
        </div>
    </div>
    <div id="look">
        <input type="checkbox" name="open" id="look-note">
        <div class="details-content">
            <div>
                <div id="look-settings" style="display: none;">
                    <div>
                        <h4>タグ絞り込み</h4>
                        <select class="search-select" id="search-tag-select">
                            <option value="" selected>しない</option>
                        </select>
                    </div>
                    <div>
                        <h4>ソート</h4>
                        <select class="search-select" id="sort-select">
                            <option value="" selected>しない</option>
                            <option value="time">時間</option>
                            <option value="fare">料金</option>
                        </select>
                        <select class="search-select" id="order-select">
                            <option value="ascending" selected>昇順</option>
                            <option value="descending">降順</option>
                        </select>
                    </div>
                </div>
                <div id="data-list"></div>
            </div>
        </div>
    </div>
    <div id="insert-area">
        <h1>トレインノート</h1>
        <div>
            <button id="description-button">説明</button>
        </div>
        <div>
            <button id="show-data">ノートを見る</button>
        </div>
        <div>
            <p class="insert-box">
                <span class="insert-title">題名</span>
                <input type="text" class="insert save-content-insert" placeholder="ノートのタイトル" id="insert-title" data-id="title">
            </p>
            <div id="insert"></div>
            <div class="details" id="other-options">
                <div>
                    <button class="details-button" id="open-other-options-button" data-target="open-other-options">
                        <b>その他のオプション</b>
                        <input type="checkbox" name="open" id="open-other-options">
                    </button>
                </div>
                <div class="details-content">
                    <div>
                        <div class="grid-insert-box">
                            <div class="insert-box">
                                <span class="insert-title">タグ</span>
                                <input type="text" class="insert save-content-insert" placeholder="例: 旅行" id="insert-tag" data-id="insertTag">
                            </div>
                            <div id="tag-box">
                                <button id="add-tag-button">+タグを追加</button>
                                <div id="tag-list"></div>
                            </div>
                        </div>
                        <div class="grid-insert-box">
                            <div class="insert-title">このノートのメモ</div>
                            <textarea class="save-content-insert" placeholder="例: 1日乗車券使用" id="insert-note" data-id="note"></textarea>
                        </div>
                        <div class="grid-insert-box">
                            <div class="insert-title">URL</div>
                            <div class="insert-box">
                                <span class="insert-title">表示</span>
                                <input type="text" class="insert save-content-insert" placeholder="URLの表示名" id="insert-url-title" data-id="insertUrl">
                            </div>
                            <div class="insert-box">
                                <span class="insert-title">URL</span>
                                <input type="text" class="insert save-content-insert" placeholder="URL" id="insert-url" data-id="insertUrl">
                            </div>
                            <div id="url-box">
                                <button id="add-url-button">+URLを追加</button>
                                <div id="url-list"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div>
                <button id="add-note">+ノートを追加</button>
            </div>
        </div>
        <div id="settings">
            <div>
                <button class="details-button" id="open-settings-button" data-target="open-settings">
                    <b>設定・詳細</b>
                </button>
            </div>
            <input type="checkbox" id="open-settings">
            <div class="details-content">
                <div>
                    <h2>設定</h2>
                    <div>
                        ノートの表示方式: 
                        <select class="settings-select" id="display-method">
                            <option value="list" selected>リスト</option>
                            <option value="table">表</option>
                        </select>
                    </div>
                    <h2>詳細</h2>
                    <div>
                        <p>
                            <a href="https://pond-pastel.github.io/home.html">ホームページ</a>
                        </p>
                        <p>
                            <a href="https://x.com/pond_pastel_dev" target="_blank" rel="nofollow noopener noreferrer">X(旧: Twitter): @pond_pastel_dev</a>
                        </p>
                    </div>
                    <h3>バージョン履歴</h3>
                    <div>
                        <div class="details">
                            <div>
                                <button class="details-button" data-target="v-1-0-0">
                                    <b>Ver.1.0.0</b>
                                </button>
                            </div>
                            <input type="checkbox" name="open" id="v-1-0-0">
                            <div class="details-content">
                                <div>
                                    <div>
                                        <time datetime="2026-05-26">2026年5月26日</time>
                                    </div>
                                    <div>
                                        サイトの公開
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
